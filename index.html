<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}

.opt select,.opt input[type=text]{padding:6px 10px;border-radius:6px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;outline:none}
.opt input[type=text]{width:60px;text-align:center}

<body>
<div class="container">
<h1>CSV ↔ JSON</h1>
<p class="subtitle">Convert between CSV and JSON. No upload, no server.</p>

<div class="mode-toggle">
  <button class="mode-btn active" onclick="setMode('csv2json')">CSV → JSON</button>
  <button class="mode-btn" onclick="setMode('json2csv')">JSON → CSV</button>
</div>

<div class="options">
  <div class="opt"><label>Delimiter</label><select id="delim"><option value=",">,</option><option value="	">Tab</option><option value=";">;</option><option value="|">|</option></select></div>
  <div class="opt"><label>Quote</label><select id="quote"><option value="&quot;">"</option><option value="'">'</option></select></div>
  <div class="opt"><label><input type="checkbox" id="hasHeader" checked> First row is header</label></div>
  <div class="opt"><label>JSON indent</label><select id="indent"><option value="2">2 spaces</option><option value="4">4 spaces</option><option value="\t">Tab</option><option value="0">Minified</option></select></div>
</div>

<div class="editor">
  <div class="pane"><h3 id="inputLabel">CSV Input</h3><textarea id="input" placeholder="Paste CSV here..."></textarea></div>
  <div class="pane"><h3 id="outputLabel">JSON Output</h3><textarea id="output" readonly placeholder="Result will appear here..."></textarea></div>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="convert()">Convert</button>
  <button class="btn" onclick="copyOutput()">Copy Output</button>
  <button class="btn" onclick="downloadOutput()">Download</button>
  <button class="btn" onclick="swap()">⇄ Swap</button>
  <button class="btn" onclick="clearAll()">Clear</button>
  <button class="btn" onclick="loadSample()">Sample Data</button>
</div>

<div class="stats" id="stats"></div>

<div class="preview-section" id="previewSection" style="display:none">
  <h3>Table Preview</h3>
  <div class="table-wrap" id="tableWrap"></div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/csv-json">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
let mode='csv2json';

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='csv2json'?0:1)));
  document.getElementById('inputLabel').textContent=m==='csv2json'?'CSV Input':'JSON Input';
  document.getElementById('outputLabel').textContent=m==='csv2json'?'JSON Output':'CSV Output';
  document.getElementById('input').placeholder=m==='csv2json'?'Paste CSV here...':'Paste JSON array here...';
}

function parseCSV(text,delim,quoteChar,hasHeader){
  const rows=[];let row=[],field='',inQuote=false,i=0;
  while(i<text.length){
    const ch=text[i];
    if(inQuote){
      if(ch===quoteChar){
        if(text[i+1]===quoteChar){field+=quoteChar;i+=2}
        else{inQuote=false;i++}
      }else{field+=ch;i++}
    }else{
      if(ch===quoteChar){inQuote=true;i++}
      else if(ch===delim){row.push(field);field='';i++}
      else if(ch==='\r'||ch==='\n'){
        row.push(field);field='';
        if(row.some(c=>c!==''))rows.push(row);
        row=[];
        if(ch==='\r'&&text[i+1]==='\n')i+=2;else i++;
      }else{field+=ch;i++}
    }
  }
  row.push(field);
  if(row.some(c=>c!==''))rows.push(row);

  if(!hasHeader||rows.length===0)return{headers:null,data:rows};
  const headers=rows[0];
  const data=rows.slice(1).map(r=>{
    const obj={};
    headers.forEach((h,j)=>obj[h]=r[j]!==undefined?r[j]:'');
    return obj;
  });
  return{headers,data};
}

function toCSV(arr,delim,quoteChar){
  if(!Array.isArray(arr)||arr.length===0)return'';
  const keys=Object.keys(arr[0]);
  const escape=v=>{
    const s=String(v??'');
    if(s.includes(delim)||s.includes(quoteChar)||s.includes('\n'))
      return quoteChar+s.replace(new RegExp(quoteChar.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),quoteChar+quoteChar)+quoteChar;
    return s;
  };
  const lines=[keys.map(escape).join(delim)];
  arr.forEach(row=>lines.push(keys.map(k=>escape(row[k])).join(delim)));
  return lines.join('\n');
}

function convert(){
  const input=document.getElementById('input').value.trim();
  if(!input){showToast('No input');return}
  const delim=document.getElementById('delim').value;
  const quoteChar=document.getElementById('quote').value;
  const hasHeader=document.getElementById('hasHeader').checked;
  const indentVal=document.getElementById('indent').value;
  const indent=indentVal==='\t'?'\t':indentVal==='0'?undefined:+indentVal;

  try{
    let result,rows,cols;
    if(mode==='csv2json'){
      const{headers,data}=parseCSV(input,delim,quoteChar,hasHeader);
      result=JSON.stringify(hasHeader?data:data,null,indent);
      rows=Array.isArray(data)?data.length:0;
      cols=headers?headers.length:(data[0]?data[0].length:0);
      showPreview(headers,hasHeader?data.map(o=>Object.values(o)):data);
    }else{
      const arr=JSON.parse(input);
      if(!Array.isArray(arr))throw new Error('Input must be a JSON array');
      result=toCSV(arr,delim,quoteChar);
      rows=arr.length;
      cols=arr.length>0?Object.keys(arr[0]).length:0;
      const keys=arr.length>0?Object.keys(arr[0]):[];
      showPreview(keys,arr.map(o=>keys.map(k=>o[k])));
    }
    document.getElementById('output').value=result;
    showStats(rows,cols,new Blob([input]).size,new Blob([result]).size);
  }catch(e){
    document.getElementById('output').value='Error: '+e.message;
    document.getElementById('stats').innerHTML='';
    document.getElementById('previewSection').style.display='none';
  }
}

function showPreview(headers,rows){
  const max=100;
  const display=rows.slice(0,max);
  let html='<table>';
  if(headers){html+='<tr>'+headers.map(h=>`<th>${esc(h)}</th>`).join('')+'</tr>'}
  display.forEach(r=>{
    html+='<tr>';
    const cells=Array.isArray(r)?r:Object.values(r);
    cells.forEach(c=>html+=`<td>${esc(String(c??''))}</td>`);
    html+='</tr>';
  });
  html+='</table>';
  if(rows.length>max)html+=`<div style="padding:8px;color:#555;font-size:0.75rem;text-align:center">Showing ${max} of ${rows.length} rows</div>`;
  document.getElementById('tableWrap').innerHTML=html;
  document.getElementById('previewSection').style.display='block';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showStats(rows,cols,inSize,outSize){
  document.getElementById('stats').innerHTML=[
    {num:rows,lbl:'Rows'},{num:cols,lbl:'Columns'},
    {num:formatBytes(inSize),lbl:'Input Size'},{num:formatBytes(outSize),lbl:'Output Size'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function formatBytes(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  return(b/1048576).toFixed(1)+' MB';
}

function copyOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  navigator.clipboard.writeText(v);
  showToast('Copied!');
}

function downloadOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  const ext=mode==='csv2json'?'json':'csv';
  const mime=mode==='csv2json'?'application/json':'text/csv';
  const blob=new Blob([v],{type:mime});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='converted.'+ext;
  a.click();
  URL.revokeObjectURL(a.href);
}

function swap(){
  const inp=document.getElementById('input');
  const out=document.getElementById('output');
  const tmp=out.value;
  inp.value=tmp;
  out.value='';
  setMode(mode==='csv2json'?'json2csv':'csv2json');
  document.getElementById('stats').innerHTML='';
  document.getElementById('previewSection').style.display='none';
}

function clearAll(){
  document.getElementById('input').value='';
  document.getElementById('output').value='';
  document.getElementById('stats').innerHTML='';
  document.getElementById('previewSection').style.display='none';
}

function loadSample(){
  if(mode==='csv2json'){
    document.getElementById('input').value='name,age,city,role\nAlice,30,Tokyo,Engineer\nBob,25,Osaka,Designer\nCharlie,35,Kyoto,Manager\nDiana,28,Nagoya,Developer\nEve,32,Yokohama,Analyst';
  }else{
    document.getElementById('input').value=JSON.stringify([
      {name:'Alice',age:30,city:'Tokyo',role:'Engineer'},
      {name:'Bob',age:25,city:'Osaka',role:'Designer'},
      {name:'Charlie',age:35,city:'Kyoto',role:'Manager'},
      {name:'Diana',age:28,city:'Nagoya',role:'Developer'},
      {name:'Eve',age:32,city:'Yokohama',role:'Analyst'}
    ],null,2);
  }
  convert();
}

function showToast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

document.getElementById('input').addEventListener('input',()=>{
  const v=document.getElementById('input').value.trim();
  if(v.length>10)convert();
});
</script>
